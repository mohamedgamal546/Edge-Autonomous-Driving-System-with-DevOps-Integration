version: "3.9"

# ════════════════════════════════════════════════════════════════════════════
#  Edge Autonomous Driving System — Docker Compose
#  All services communicate exclusively via Mosquitto MQTT broker.
#  Prometheus scrapes every service's /metrics endpoint.
#  Grafana visualises everything on a single dashboard.
# ════════════════════════════════════════════════════════════════════════════

networks:
  car_net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  mosquitto_data:
  mosquitto_logs:

# ── Shared environment template ───────────────────────────────────────────────
x-common-env: &common-env
  MQTT_BROKER: mosquitto
  MQTT_PORT: "1883"
  PYTHONUNBUFFERED: "1"

# ── Shared restart policy ─────────────────────────────────────────────────────
x-restart: &restart
  restart: unless-stopped

# ── Shared Raspberry Pi hardware access ───────────────────────────────────────
x-pi-devices: &pi-devices
  devices:
    - /dev/video0:/dev/video0          # USB / Pi camera
  privileged: true                     # Required for GPIO access

services:

  # ── 1. MQTT Broker ────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: mosquitto
    <<: *restart
    ports:
      - "1883:1883"    # MQTT
      - "9001:9001"    # WebSocket (optional dashboard)
    volumes:
      - ./devops/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks: [car_net]
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-t", "health/check", "-m", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Camera Service ─────────────────────────────────────────────────────
  camera:
    build:
      context: .
      dockerfile: devops/docker/Dockerfile.service
      args:
        SERVICE_NAME: camera
    container_name: camera_service
    <<: [*restart, *pi-devices]
    environment:
      <<: *common-env
      CAMERA_INDEX: "0"
      TARGET_FPS: "15"
      JPEG_QUALITY: "80"
      FRAME_WIDTH: "640"
      FRAME_HEIGHT: "480"
      ENABLE_LED: "true"
      LED_GPIO_PIN: "18"
      METRICS_PORT: "8001"
    ports:
      - "8001:8001"    # Prometheus metrics
    networks: [car_net]
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── 3. Lane Detection Service ──────────────────────────────────────────────
  lane_detection:
    build:
      context: .
      dockerfile: devops/docker/Dockerfile.service
      args:
        SERVICE_NAME: lane_detection
    container_name: lane_detection_service
    <<: *restart
    environment:
      <<: *common-env
      CANNY_LOW: "50"
      CANNY_HIGH: "150"
      HOUGH_THRESH: "40"
      HOUGH_MIN_LEN: "80"
      HOUGH_MAX_GAP: "25"
      METRICS_PORT: "8002"
    ports:
      - "8002:8002"
    networks: [car_net]
    depends_on:
      mosquitto:
        condition: service_healthy

  # ── 4. Obstacle Detection Service ─────────────────────────────────────────
  obstacle_detection:
    build:
      context: .
      dockerfile: devops/docker/Dockerfile.service
      args:
        SERVICE_NAME: obstacle_detection
    container_name: obstacle_detection_service
    <<: [*restart, *pi-devices]
    environment:
      <<: *common-env
      ULTRASONIC_TRIG: "23"
      ULTRASONIC_ECHO: "24"
      DANGER_DISTANCE_CM: "30"
      WARN_DISTANCE_CM: "60"
      MIN_OBSTACLE_AREA: "800"
      METRICS_PORT: "8003"
    ports:
      - "8003:8003"
    networks: [car_net]
    depends_on:
      mosquitto:
        condition: service_healthy

  # ── 5. Traffic Light Service ───────────────────────────────────────────────
  traffic_light:
    build:
      context: .
      dockerfile: devops/docker/Dockerfile.service
      args:
        SERVICE_NAME: traffic_light
    container_name: traffic_light_service
    <<: *restart
    environment:
      <<: *common-env
      TL_MIN_AREA: "120"
      TL_CONFIRM_FRAMES: "3"
      METRICS_PORT: "8004"
    ports:
      - "8004:8004"
    networks: [car_net]
    depends_on:
      mosquitto:
        condition: service_healthy

  # ── 6. Control Service ────────────────────────────────────────────────────
  control:
    build:
      context: .
      dockerfile: devops/docker/Dockerfile.service
      args:
        SERVICE_NAME: control
    container_name: control_service
    <<: [*restart, *pi-devices]
    environment:
      <<: *common-env
      BASE_SPEED: "55"
      SLOW_SPEED: "30"
      TURN_GAIN: "35"
      SERVO_CENTER: "90"
      SERVO_MAX: "140"
      SERVO_MIN: "40"
      ENA_PIN: "12"
      IN1_PIN: "20"
      IN2_PIN: "21"
      ENB_PIN: "13"
      IN3_PIN: "19"
      IN4_PIN: "26"
      SERVO_PIN: "17"
      METRICS_PORT: "8005"
    ports:
      - "8005:8005"
    networks: [car_net]
    depends_on:
      mosquitto:
        condition: service_healthy
      lane_detection:
        condition: service_started
      traffic_light:
        condition: service_started
      obstacle_detection:
        condition: service_started

  # ── 7. System Monitor ─────────────────────────────────────────────────────
  system_monitor:
    build:
      context: .
      dockerfile: devops/docker/Dockerfile.service
      args:
        SERVICE_NAME: system_monitor
    container_name: system_monitor_service
    <<: *restart
    environment:
      <<: *common-env
      STALE_TIMEOUT: "15"
      APP_VERSION: "${APP_VERSION:-1.0.0}"
      METRICS_PORT: "8006"
    ports:
      - "8006:8006"
    networks: [car_net]
    depends_on:
      mosquitto:
        condition: service_healthy

  # ── 8. Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    <<: *restart
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks: [car_net]
    depends_on:
      - camera
      - lane_detection
      - obstacle_detection
      - traffic_light
      - control
      - system_monitor

  # ── 9. Grafana ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    <<: *restart
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: autonomouscar
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/system_overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks: [car_net]
    depends_on:
      - prometheus

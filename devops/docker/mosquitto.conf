# ════════════════════════════════════════════════════════════════════════════
#  Mosquitto MQTT Broker Configuration
#  Eclipse Mosquitto 2.x
# ════════════════════════════════════════════════════════════════════════════

# Allow anonymous connections (internal car network only)
allow_anonymous true

# Standard MQTT listener
listener 1883 0.0.0.0
protocol mqtt

# WebSocket listener (optional — for browser-based dashboards)
listener 9001 0.0.0.0
protocol websockets

# Persistence — survive broker restarts
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Message queue settings
max_queued_messages 1000
max_packet_size 5242880    # 5 MB (needed for camera frame payloads)

# Keep-alive
keepalive_interval 60
